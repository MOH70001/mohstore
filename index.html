<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOH STORE | VIP SYSTEM</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary-gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #161616;
            --text-gray: #b0b0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* حاوية المحتوى الرئيسي */
        .container {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        /* تصميم اللوجو */
        .logo-container {
            position: relative;
            margin-bottom: 30px;
        }

        .logo-container img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--primary-gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
            transition: transform 0.3s ease;
        }

        .logo-container img:hover {
            transform: scale(1.05);
        }

        /* النصوص العناوين */
        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            letter-spacing: 2px;
            background: linear-gradient(to right, #fff, var(--primary-gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .vip-status {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 5px;
            color: var(--text-gray);
            margin-bottom: 40px;
        }

        /* أزرار الخدمات / الفئات */
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 800px;
            margin-bottom: 50px;
        }

        .category-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #333;
            text-decoration: none;
            color: white;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .category-card:hover {
            border-color: var(--primary-gold);
            background: #1f1f1f;
            transform: translateY(-5px);
        }

        .btn-whatsapp {
            background-color: #25d366;
            color: white;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.1rem;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: 0.3s;
        }

        .btn-whatsapp:hover {
            background-color: #1ebe57;
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.5);
        }

        /* الفوتر وعداد الزوار */
        footer {
            background-color: #000;
            padding: 30px 20px;
            text-align: center;
            border-top: 2px solid var(--primary-gold);
        }

        .visitor-section {
            display: inline-block;
            background: #111;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #222;
        }

        .visitor-label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-gray);
            margin-bottom: 8px;
        }

        .footer-copyright {
            margin-top: 15px;
            font-size: 0.75rem;
            color: #444;
        }

    </style>
</head>
<body>

    <div class="container">
        <div class="logo-container">
            <img src="Logo.png.JPG" alt="MOH STORE">
        </div>

        <h1>MOH STORE</h1>
        <div class="vip-status">PRIVATE ACCESS • VIP SYSTEM</div>

        <div class="categories">
            <div class="category-card">
                <i class="fas fa-gem" style="color: var(--primary-gold); margin-bottom: 10px; font-size: 1.5rem;"></i>
                <h3>اشتراكات VIP</h3>
                <p style="font-size: 0.8rem; color: #888;">وصول حصري لأقوى الأنظمة والبرامج</p>
            </div>
            <div class="category-card">
                <i class="fas fa-download" style="color: #3498db; margin-bottom: 10px; font-size: 1.5rem;"></i>
                <h3>تطبيقات معدلة</h3>
                <p style="font-size: 0.8rem; color: #888;">تحميل مباشر بضغطة زر واحدة</p>
            </div>
        </div>

        <a href="https://wa.me/966538506619" class="btn-whatsapp">
            <i class="fab fa-whatsapp"></i> تواصل للاشتراك
        </a>
    </div>

    <footer>
        <div class="visitor-section">
            <span class="visitor-label"><i class="fas fa-users"></i> إحصائيات المتجر</span>
            <img src="https://hits.seeyoufarm.com/api/count/incr/badge.svg?url=https%3A%2F%2Fmoh70001.github.io%2FMOHSTORE&count_bg=%23d4af37&title_bg=%23222222&icon=&icon_color=%23E7E7E7&title=الزوار&edge_flat=false" alt="Visitor Counter"/>
        </div>
        <div class="footer-copyright">
            &copy; 2024 MOH STORE. Developed with Excellence.
        </div>
    </footer>

</body>
</html>
