<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOH STORE VIP</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            background-color: #0f0f0f; /* لون خلفية داكن فخم */
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            max-width: 400px;
            width: 90%;
        }

        .logo {
            width: 150px; /* حجم الشعار */
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #ffd700; /* إطار ذهبي بسيط */
            margin-bottom: 20px;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        h1 {
            font-size: 24px;
            margin-bottom: 10px;
            color: #ffd700; /* لون ذهبي للنصوص الهامة */
        }

        p {
            font-size: 16px;
            color: #cccccc;
            margin-bottom: 30px;
        }

        .btn-contact {
            display: inline-block;
            background-color: #25d366; /* لون واتساب */
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 50px;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(37, 211, 102, 0.3);
        }

        .btn-contact:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(37, 211, 102, 0.5);
            background-color: #20bd5a;
        }

        /* تأثيرات التحميل للموقع */
        .fade-in {
            animation: fadeIn 1.5s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="container fade-in">
        <img src="Logo.png.JPG" alt="MOH STORE VIP" class="logo">
        
        <h1>MOH STORE VIP</h1>
        <p>نظام المجموعات الخاصة المحمي</p>
        
        <hr style="border: 0; border-top: 1px solid rgba(255,255,255,0.1); margin-bottom: 20px;">

        <p>أدخل رمز التحقق للمتابعة أو تواصل مع الإدارة:</p>

        <a href="https://wa.me/966538506619?text=أحتاج رمز الدخول لمجموعة" class="btn-contact">
            Contact for Keys 🟢
        </a>
    </div>

</body>
</html>
