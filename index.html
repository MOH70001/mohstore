<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOH Store | متجر الـ IPA</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f0f2f5; }
        .app-card { border-radius: 20px; transition: 0.3s; }
        .app-card:active { transform: scale(0.98); }
        .install-btn { background: linear-gradient(135deg, #007aff, #00c6ff); }
    </style>
</head>
<body class="p-4">

    <div class="flex justify-between items-center mb-8 px-2">
        <div>
            <h1 class="text-2xl font-bold text-gray-800">MOH STORE</h1>
            <p class="text-xs text-blue-500 font-bold">إدارة المشتركين ورفع IPA</p>
        </div>
        <div class="w-12 h-12 bg-white rounded-full shadow-sm flex items-center justify-center">
            🚀
        </div>
    </div>

    <div id="app-list" class="space-y-4">
        <div class="app-card bg-white p-4 shadow-sm flex items-center justify-between">
            <div class="flex items-center">
                <div class="w-14 h-14 bg-gray-100 rounded-2xl mr-3 shadow-inner flex items-center justify-center text-2xl">📱</div>
                <div class="mr-3">
                    <h3 class="font-bold text-gray-800">تطبيق تجريبي</h3>
                    <p class="text-[10px] text-gray-400">يرجى إضافة تطبيقات من لوحة التحكم</p>
                </div>
            </div>
            <button class="install-btn text-white px-6 py-2 rounded-full text-xs font-bold shadow-md">تثبيت</button>
        </div>
    </div>

    <div class="fixed bottom-5 left-5 right-5 bg-white/80 backdrop-blur-md h-16 rounded-2xl shadow-xl flex justify-around items-center border border-white/20">
        <button class="text-blue-600">🏠</button>
        <button class="text-gray-400" onclick="alert('لوحة التحكم قيد التجهيز')">⚙️</button>
        <button class="text-gray-400">👤</button>
    </div>

</body>
</html>
