<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOH STORE | VIP SYSTEM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #02040a; color: white; min-height: 100vh; margin: 0; padding: 0; }
        .wolf-gradient { background: linear-gradient(135deg, #ff8a05 0%, #ff05a0 50%, #0570ff 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .month-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.05); transition: 0.3s; }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.95); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="p-4 pb-32">

    <header class="text-center my-10">
        <div class="inline-block p-[2px] rounded-full wolf-gradient mb-4">
            <div class="bg-[#02040a] rounded-full p-2">
                <img src="Logo.png.JPG" class="w-20 h-20 object-cover rounded-full" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <div style="display:none;" class="w-20 h-20 flex items-center justify-center font-bold text-orange-500">MOH</div>
            </div>
        </div>
        <h1 class="text-4xl font-black italic bg-gradient-to-r from-[#ff8a05] to-[#0570ff] bg-clip-text text-transparent uppercase">MOH STORE</h1>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-5xl mx-auto" id="monthsGrid"></div>

    <div id="passModal" class="modal">
        <div class="glass w-full max-w-sm rounded-[2rem] p-8 text-center">
            <h2 id="targetMonth" class="text-xl font-bold mb-4 text-white"></h2>
            <input type="text" id="passInput" placeholder="أدخل الرمز" class="w-full bg-white/10 border border-white/20 rounded-xl py-3 text-center text-white mb-4 outline-none">
            <button onclick="verifyUser()" class="wolf-gradient w-full py-3 rounded-xl font-bold text-white">دخول</button>
            <button onclick="closePassModal()" class="mt-4 text-gray-500 text-sm">إلغاء</button>
        </div>
    </div>

    <div id="filesModal" class="modal">
        <div class="glass w-full max-w-md rounded-[2rem] p-6 relative">
            <button onclick="closeFilesModal()" class="absolute top-4 left-4 text-white">✕</button>
            <h2 id="welcomeMessage" class="text-center font-bold mb-6"></h2>
            <div id="filesList" class="space-y-3"></div>
        </div>
    </div>

    <script>
        const groups = [
            { name: "يناير - 01", key: "moh011", expiry: "2027-01-31" },
            { name: "فبراير - 02", key: "moh090", expiry: "2027-02-28" },
            { name: "مارس - 03", key: "moh070", expiry: "2027-03-31" },
            { name: "أبريل - 04", key: "moh333", expiry: "2027-04-30" },
            { name: "مايو - 05", key: "moh327", expiry: "2027-05-31" },
            { name: "يونيو - 06", key: "moh891", expiry: "2027-06-30" },
            { name: "يوليو - 07", key: "moh354", expiry: "2027-07-31" },
            { name: "أغسطس - 08", key: "moh790", expiry: "2027-08-31" },
            { name: "سبتمبر - 09", key: "moh369", expiry: "2027-09-30" },
            { name: "أكتوبر - 10", key: "moh589", expiry: "2027-10-31" },
            { name: "نوفمبر - 11", key: "moh373", expiry: "2027-11-30" },
            { name: "ديسمبر - 12", key: "moh893", expiry: "2027-12-31" }
        ];

        const files = [
            { n: "Wolf 12.0", id: "3198797563b91b3001f7ac4665ea206b" },
            { n: "Wolf 12.0.1", id: "1ce031952ac54f99bccd6b5f3d64d5d5" }
        ];

        const grid = document.getElementById('monthsGrid');
        groups.forEach(g => {
            grid.innerHTML += `
                <div onclick="openPassBox('${g.name}')" class="month-card p-6 rounded-3xl text-center cursor-pointer hover:scale-105 active:scale-95 shadow-lg">
                    <div class="text-white font-bold">${g.name}</div>
                    <div class="text-[8px] text-pink-500 font-bold mt-2 italic uppercase tracking-widest">VIP Access</div>
                </div>
            `;
        });

        let selectedGroup = null;
        function openPassBox(n) {
            selectedGroup = groups.find(g => g.name === n);
            document.getElementById('targetMonth').innerText = n;
            document.getElementById('passModal').classList.add('active');
        }

        function verifyUser() {
            const val = document.getElementById('passInput').value;
            if (val === selectedGroup.key || val === "rafa 2027") {
                document.getElementById('passModal').classList.remove('active');
                showLinks();
            } else { alert("الرمز خطأ!"); }
        }

        function showLinks() {
            document.getElementById('welcomeMessage').innerText = "تم تفعيل الوصول ✅";
            const list = document.getElementById('filesList');
            list.innerHTML = '';
            files.forEach(f => {
                list.innerHTML += `
                    <a href="itms-services://?action=download-manifest&url=https%3A%2F%2Fwww.pgyer.com%2Fapp%2Fplist%2F${f.id}" 
                       class="flex items-center justify-between bg-white/5 p-4 rounded-2xl border border-white/10">
                        <span class="text-sm font-bold">${f.n}</span>
                        <span class="bg-orange-500 text-[10px] px-3 py-1 rounded-lg">تثبيت</span>
                    </a>`;
            });
            document.getElementById('filesModal').classList.add('active');
        }

        function closePassModal() { document.getElementById('passModal').classList.remove('active'); }
        function closeFilesModal() { document.getElementById('filesModal').classList.remove('active'); }
    </script>
</body>
</html>
