<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOH STORE | VIP Access</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="wolf.png.JPG">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #02040a; color: white; min-height: 100vh; overflow-x: hidden; }
        .wolf-gradient { background: linear-gradient(135deg, #ff8a05 0%, #ff05a0 50%, #0570ff 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        input:focus { border-color: #ff8a05; box-shadow: 0 0 15px rgba(255, 138, 5, 0.2); }
    </style>
</head>
<body class="p-6">

    <header class="text-center my-10">
        <div class="inline-block p-[2px] rounded-full wolf-gradient mb-4 shadow-[0_0_30px_rgba(255,138,5,0.4)]">
            <div class="bg-[#02040a] rounded-full p-2">
                <img src="wolf.png.JPG" class="w-20 h-20 object-contain rounded-full" alt="Logo">
            </div>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter bg-gradient-to-r from-[#ff8a05] to-[#0570ff] bg-clip-text text-transparent uppercase">MOH STORE</h1>
        <p class="text-[10px] text-gray-500 font-bold tracking-[0.3em] mt-2 uppercase">Vip Encrypted System</p>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-5xl mx-auto" id="monthsGrid"></div>

    <div id="passModal" class="modal">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-10 text-center border-t border-white/20">
            <div class="text-3xl mb-4">🔐</div>
            <h2 id="targetMonth" class="text-xl font-black mb-6 italic text-white tracking-tight"></h2>
            
            <input type="text" id="passInput" placeholder="أدخل الرمز هنا" 
                   class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 text-center text-xl mb-6 outline-none transition-all placeholder:text-gray-700">
            
            <button onclick="checkPassword()" class="wolf-gradient w-full py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-transform">تأكيد الدخول</button>
            <button onclick="closePassModal()" class="mt-6 text-[10px] text-gray-500 uppercase font-bold tracking-widest block mx-auto">إلغاء</button>
        </div>
    </div>

    <div id="filesModal" class="modal">
        <div class="glass w-full max-w-md rounded-[3rem] p-8 relative">
            <button onclick="closeFilesModal()" class="absolute top-6 left-6 text-gray-500 font-bold">✕</button>
            <div class="text-center mb-8">
                <img src="wolf.png.JPG" class="w-16 h-16 mx-auto mb-4 object-contain rounded-full border border-white/10 shadow-2xl shadow-orange-500/20">
                <h2 id="activeMonthTitle" class="text-xl font-black italic text-white uppercase"></h2>
                <div class="flex justify-center items-center gap-2 mt-2">
                    <span class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></span>
                    <span class="text-[8px] font-bold text-green-500 tracking-widest uppercase italic">Certificate Active ✅</span>
                </div>
            </div>
            <div class="space-y-3" id="filesList"></div>
        </div>
    </div>

    <script>
        // الرموز السرية لكل شهر (تأكد من كتابتها بين علامتي " ")
        const monthsData = [
            { name: "JANUARY - 01", pass: "1111" }, { name: "FEBRUARY - 02", pass: "2222" },
            { name: "MARCH - 03", pass: "3333" }, { name: "APRIL - 04", pass: "4444" },
            { name: "MAY - 05", pass: "5555" }, { name: "JUNE - 06", pass: "6666" },
            { name: "JULY - 07", pass: "7777" }, { name: "AUGUST - 08", pass: "8888" },
            { name: "SEPTEMBER - 09", pass: "9999" }, { name: "OCTOBER - 10", pass: "1010" },
            { name: "NOVEMBER - 11", pass: "1100" }, { name: "DECEMBER - 12", pass: "1212" }
        ];

        const filesData = [
            { n: "Wolf 12.0", id: "3198797563b91b3001f7ac4665ea206b" },
            { n: "Wolf 12.0.1", id: "1ce031952ac54f99bccd6b5f3d64d5d5" },
            { n: "Wolf 12.0.2", id: "4498deea9dac4127eef6e6ffdf02dc45" },
            { n: "Wolf 12.0.3", id: "fd9dcab4f9a4dbfe401a706889149747" }
        ];

        let currentActiveGroup = null;

        const grid = document.getElementById('monthsGrid');
        monthsData.forEach(m => {
            grid.innerHTML += `
                <div onclick="requestPass('${m.name}', '${m.pass}')" class="glass p-6 rounded-[2rem] text-center group hover:bg-white/5 transition-all cursor-pointer border border-white/5 shadow-lg shadow-black/20">
                    <div class="text-xs font-black mb-1 group-hover:text-orange-500 transition-colors">${m.name}</div>
                    <div class="text-[7px] text-gray-600 font-bold uppercase tracking-widest italic">Locked Access</div>
                </div>
            `;
        });

        function requestPass(name, pass) {
            currentActiveGroup = { name, pass };
            document.getElementById('targetMonth').innerText = name;
            document.getElementById('passInput').value = ""; // تنظيف الحقل
            document.getElementById('passModal').classList.add('active');
        }

        function checkPassword() {
            const userInput = document.getElementById('passInput').value.trim(); // أخذ المدخل وتنظيف الفراغات
            
            // التحقق من الرمز (مقارنة دقيقة)
            if (userInput === String(currentActiveGroup.pass)) {
                document.getElementById('passModal').classList.remove('active');
                showFiles(currentActiveGroup.name);
            } else {
                alert("خطأ: الرمز السري الذي أدخلته غير صحيح!");
                document.getElementById('passInput').value = ""; // مسح الخانة للمحاولة مرة أخرى
            }
        }

        function showFiles(name) {
            document.getElementById('activeMonthTitle').innerText = name;
            const list = document.getElementById('filesList');
            list.innerHTML = '';
            filesData.forEach(f => {
                list.innerHTML += `
                    <a href="itms-services://?action=download-manifest&url=https%3A%2F%2Fwww.pgyer.com%2Fapp%2Fplist%2F${f.id}" 
                       class="flex items-center justify-between bg-white/5 p-5 rounded-2xl hover:bg-white/10 border border-white/5 transition-all active:scale-95">
                        <span class="text-[11px] font-black italic">${f.n}</span>
                        <span class="text-[9px] font-black wolf-gradient px-4 py-2 rounded-xl shadow-lg">INSTALL</span>
                    </a>
                `;
            });
            document.getElementById('filesModal').classList.add('active');
        }

        function closePassModal() { document.getElementById('passModal').classList.remove('active'); }
        function closeFilesModal() { document.getElementById('filesModal').classList.remove('active'); }
    </script>
</body>
</html>
