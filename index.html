<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>MOH STORE | PRO VIP</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="MOH STORE">
    <link rel="apple-touch-icon" href="wolf.png.JPG">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #02040a; color: white; min-height: 100vh; overflow-x: hidden; }
        .wolf-gradient { background: linear-gradient(135deg, #ff8a05 0%, #ff05a0 50%, #0570ff 100%); }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); }
        
        /* دليل التثبيت (Popup) */
        #pwaGuide { 
            display: none; position: fixed; bottom: 20px; left: 20px; right: 20px; 
            z-index: 200; border-radius: 2rem; padding: 20px;
            animation: slideUp 0.5s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        
        .modal { display: none; position: fixed; inset: 0; z-index: 100; background: rgba(0,0,0,0.9); backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="p-6">

    <header class="text-center my-10">
        <div class="inline-block p-[2px] rounded-full wolf-gradient mb-4 shadow-[0_0_30px_rgba(255,138,5,0.4)]">
            <div class="bg-[#02040a] rounded-full p-2">
                <img src="wolf.png.JPG" class="w-20 h-20 object-contain rounded-full" alt="Logo">
            </div>
        </div>
        <h1 class="text-4xl font-black italic tracking-tighter bg-gradient-to-r from-[#ff8a05] to-[#0570ff] bg-clip-text text-transparent uppercase text-center">MOH STORE</h1>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 max-w-5xl mx-auto" id="monthsGrid"></div>

    <div id="pwaGuide" class="glass border-t border-white/20 shadow-2xl">
        <div class="flex items-center gap-4">
            <img src="wolf.png.JPG" class="w-12 h-12 rounded-xl shadow-lg">
            <div class="flex-1">
                <h3 class="text-xs font-black">ثبت المتجر كتطبيق</h3>
                <p class="text-[9px] text-gray-400">اضغط <span class="inline-block bg-white/10 p-1 rounded">⤴️ مشاركة</span> ثم <span class="text-white font-bold text-[10px]">إضافة للشاشة الرئيسية</span></p>
            </div>
            <button onclick="closePwaGuide()" class="text-gray-500 font-bold px-2">✕</button>
        </div>
    </div>

    <div id="passModal" class="modal">
        <div class="glass w-full max-w-sm rounded-[2.5rem] p-10 text-center border-t border-white/20">
            <h2 id="targetMonth" class="text-xl font-black mb-6 italic text-white"></h2>
            <input type="password" id="passInput" placeholder="كود الوصول" class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 text-center text-xl mb-6 focus:border-orange-500 outline-none transition-all">
            <button onclick="checkPassword()" class="wolf-gradient w-full py-4 rounded-2xl font-black text-sm shadow-xl active:scale-95 transition-transform">تأكيد الدخول</button>
            <button onclick="closePassModal()" class="mt-6 text-[10px] text-gray-500 uppercase font-bold tracking-widest">إلغاء</button>
        </div>
    </div>

    <div id="filesModal" class="modal">
        <div class="glass w-full max-w-md rounded-[3rem] p-8 relative">
            <button onclick="closeFilesModal()" class="absolute top-6 left-6 text-gray-500">✕</button>
            <div class="text-center mb-8">
                <img src="wolf.png.JPG" class="w-16 h-16 mx-auto mb-4 object-contain rounded-full shadow-orange-500/20 shadow-2xl border border-white/10">
                <h2 id="activeMonthTitle" class="text-xl font-black italic"></h2>
                <span class="text-[8px] font-bold text-green-500 tracking-[0.3em] uppercase">Verified Online ✅</span>
            </div>
            <div class="space-y-3" id="filesList"></div>
        </div>
    </div>

    <script>
        const monthsData = [
            { name: "JANUARY - 01", pass: "1010" }, { name: "FEBRUARY - 02", pass: "2020" },
            { name: "MARCH - 03", pass: "3030" }, { name: "APRIL - 04", pass: "4040" },
            { name: "MAY - 05", pass: "5050" }, { name: "JUNE - 06", pass: "6060" },
            { name: "JULY - 07", pass: "7070" }, { name: "AUGUST - 08", pass: "8080" },
            { name: "SEPTEMBER - 09", pass: "9090" }, { name: "OCTOBER - 10", pass: "1000" },
            { name: "NOVEMBER - 11", pass: "1100" }, { name: "DECEMBER - 12", pass: "1200" }
        ];

        const filesData = [
            { n: "Wolf 12.0", id: "3198797563b91b3001f7ac4665ea206b" },
            { n: "Wolf 12.0.1", id: "1ce031952ac54f99bccd6b5f3d64d5d5" },
            { n: "Wolf 12.0.2", id: "4498deea9dac4127eef6e6ffdf02dc45" },
            { n: "Wolf 12.0.3", id: "fd9dcab4f9a4dbfe401a706889149747" }
        ];

        let currentActiveMonth = null;

        // إظهار الأشهر
        const grid = document.getElementById('monthsGrid');
        monthsData.forEach(m => {
            grid.innerHTML += `
                <div onclick="requestPass('${m.name}', '${m.pass}')" class="glass p-6 rounded-[2rem] text-center group hover:bg-white/10 transition-all cursor-pointer border border-white/5">
                    <div class="text-xs font-black mb-1">${m.name}</div>
                    <div class="text-[7px] text-gray-500 font-bold uppercase tracking-widest italic">Encrypted Access</div>
                </div>
            `;
        });

        // تشغيل دليل الـ PWA لمستخدمي الأيفون
        const isIos = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
        const isStandalone = window.matchMedia('(display-mode: standalone)').matches;
        if (isIos && !isStandalone) {
            setTimeout(() => { document.getElementById('pwaGuide').style.display = 'block'; }, 2000);
        }

        function requestPass(name, pass) {
            currentActiveMonth = { name, pass };
            document.getElementById('targetMonth').innerText = name;
            document.getElementById('passModal').classList.add('active');
        }

        function checkPassword() {
            const input = document.getElementById('passInput').value;
            if (input === currentActiveMonth.pass) {
                closePassModal();
                showFiles(currentActiveMonth.name);
            } else {
                alert("رمز الوصول غير صحيح!");
            }
        }

        function showFiles(name) {
            document.getElementById('activeMonthTitle').innerText = name;
            const list = document.getElementById('filesList');
            list.innerHTML = '';
            filesData.forEach(f => {
                list.innerHTML += `
                    <a href="itms-services://?action=download-manifest&url=https%3A%2F%2Fwww.pgyer.com%2Fapp%2Fplist%2F${f.id}" 
                       class="flex items-center justify-between bg-white/5 p-5 rounded-2xl hover:bg-white/10 border border-white/5 transition-all">
                        <span class="text-[11px] font-black italic tracking-wide">${f.n}</span>
                        <span class="text-[9px] font-black wolf-gradient px-4 py-2 rounded-xl">تثبيت</span>
                    </a>
                `;
            });
            document.getElementById('filesModal').classList.add('active');
        }

        function closePassModal() { document.getElementById('passModal').classList.remove('active'); document.getElementById('passInput').value = ""; }
        function closeFilesModal() { document.getElementById('filesModal').classList.remove('active'); }
        function closePwaGuide() { document.getElementById('pwaGuide').style.display = 'none'; }
    </script>
</body>
</html>
