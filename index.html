<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="robots" content="noindex, nofollow">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOH STORE | VIP GROUPS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050810; color: white; min-height: 100vh; overflow-x: hidden; }
        .wolf-gradient { background: linear-gradient(135deg, #ff8a05 0%, #ff05a0 50%, #0570ff 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); transition: all 0.3s; cursor: pointer; }
        .glass-card:hover { background: rgba(255, 255, 255, 0.07); transform: scale(1.02); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 50; align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="p-6">

    <header class="text-center my-10">
        <div class="inline-block p-[2px] rounded-full wolf-gradient mb-4 shadow-[0_0_20px_rgba(255,138,5,0.3)]">
            <div class="bg-[#050810] rounded-full p-2">
                <img src="wolf.png.JPG" class="w-16 h-16 object-contain" alt="Logo">
            </div>
        </div>
        <h1 class="text-3xl font-black italic uppercase bg-gradient-to-r from-[#ff8a05] via-[#ff05a0] to-[#0570ff] bg-clip-text text-transparent">MOH STORE VIP</h1>
        <p class="text-gray-500 text-[10px] font-bold tracking-[0.2em] mt-2">نظام المجموعات</p>
    </header>

    <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 max-w-5xl mx-auto">
        <script>
            // --- الإعدادات (هنا حدد الرموز السرية لكل شهر) ---
            const months = [
                { name: "يناير - الشهر 1", pass: "1111" },
                { name: "فبراير - الشهر 2", pass: "2222" },
                { name: "مارس - الشهر 3", pass: "3333" },
                { name: "أبريل - الشهر 4", pass: "4444" },
                { name: "مايو - الشهر 5", pass: "5555" },
                { name: "يونيو - الشهر 6", pass: "6666" },
                { name: "يوليو - الشهر 7", pass: "7777" },
                { name: "أغسطس - الشهر 8", pass: "8888" },
                { name: "سبتمبر - الشهر 9", pass: "9999" },
                { name: "أكتوبر - الشهر 10", pass: "1010" },
                { name: "نوفمبر - الشهر 11", pass: "1100" },
                { name: "ديسمبر - الشهر 12", pass: "1212" }
            ];

            // الملفات الـ 4 التي ستظهر داخل كل شهر بعد إدخال الرمز
            const files = [
                { n: "Wolf 12.0", id: "3198797563b91b3001f7ac4665ea206b" },
                { n: "Wolf 12.0.1", id: "1ce031952ac54f99bccd6b5f3d64d5d5" },
                { n: "Wolf 12.0.2", id: "4498deea9dac4127eef6e6ffdf02dc45" },
                { n: "Wolf 12.0.3", id: "fd9dcab4f9a4dbfe401a706889149747" }
            ];

            function openMonth(name, correctPass) {
                const userPass = prompt(`أدخل الرمز السري لمجموعة (${name}):`);
                if (userPass === correctPass) {
                    document.getElementById('modalTitle').innerText = name;
                    document.getElementById('monthModal').classList.add('active');
                } else if (userPass !== null) {
                    alert("الرمز السري غير صحيح!");
                }
            }

            months.forEach(m => {
                document.write(`
                    <div onclick="openMonth('${m.name}', '${m.pass}')" class="glass-card p-6 rounded-[2.5rem] text-center group">
                        <div class="text-2xl mb-2">🔒</div>
                        <h3 class="text-sm font-black">${m.name}</h3>
                        <p class="text-[8px] text-gray-600 mt-2 font-bold tracking-widest italic uppercase">محمية برمز</p>
                    </div>
                `);
            });
        </script>
    </div>

    <div id="monthModal" class="modal">
        <div class="bg-slate-900 border border-slate-800 w-full max-w-md rounded-[3rem] p-8 relative">
            <button onclick="document.getElementById('monthModal').classList.remove('active')" class="absolute top-6 left-6 text-gray-500 hover:text-white">✕</button>
            <div class="text-center mb-8">
                <img src="wolf.png.JPG" class="w-16 h-16 mx-auto mb-4 object-contain shadow-lg shadow-orange-500/20 rounded-full">
                <h2 id="modalTitle" class="text-xl font-black text-white italic tracking-tight"></h2>
                <p class="text-[10px] text-orange-500 font-bold mt-1">تم التحقق من الرمز بنجاح</p>
            </div>
            <div class="space-y-4">
                <script>
                    files.forEach(f => {
                        document.write(`
                            <a href="itms-services://?action=download-manifest&url=https%3A%2F%2Fwww.pgyer.com%2Fapp%2Fplist%2F${f.id}" 
                               class="flex items-center justify-between bg-white/5 border border-white/10 p-4 rounded-2xl hover:bg-white/10 transition-all group">
                                <span class="text-xs font-black italic tracking-wide">${f.n}</span>
                                <span class="text-[9px] font-black wolf-gradient px-4 py-1.5 rounded-full">تثبيت</span>
                            </a>
                        `);
                    });
                </script>
            </div>
        </div>
    </div>

    <footer class="mt-20 text-center pb-12">
        <a href="https://wa.me/966538506619?text=أحتاج رمز الدخول لمجموعة" class="text-[10px] font-black text-[#25D366] opacity-70 hover:opacity-100 uppercase tracking-widest transition-opacity">Contact for Keys 🟢</a>
    </footer>

</body>
</html>
