<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta name="robots" content="noindex, nofollow">
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOH STORE | WOLF</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #050810; color: white; min-height: 100vh; }
        .wolf-gradient { background: linear-gradient(135deg, #ff8a05 0%, #ff05a0 50%, #0570ff 100%); }
        .glass-card { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .shimmer { position: relative; overflow: hidden; }
        .shimmer::after {
            content: ''; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: rotate(45deg); animation: shine 4s infinite;
        }
        @keyframes shine { 0% { left: -100%; } 100% { left: 100%; } }
    </style>
</head>
<body class="p-6 flex flex-col items-center">

    <header class="text-center my-12">
        <div class="inline-block p-[2px] rounded-full wolf-gradient mb-4">
            <div class="bg-[#050810] rounded-full p-2">
                <img src="wolf.png.JPG" class="w-16 h-16 object-contain" alt="Logo">
            </div>
        </div>
        <h1 class="text-4xl font-black tracking-tighter italic uppercase bg-gradient-to-r from-[#ff8a05] via-[#ff05a0] to-[#0570ff] bg-clip-text text-transparent">MOH STORE</h1>
        <p class="text-gray-500 text-[10px] font-bold tracking-[0.3em] uppercase mt-2">مرحبا بك</p>
    </header>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-4xl w-full px-2">
        <script>
            const versions = [
                { v: "12.0", id: "3198797563b91b3001f7ac4665ea206b" },
                { v: "12.0.1", id: "1ce031952ac54f99bccd6b5f3d64d5d5" },
                { v: "12.0.2", id: "4498deea9dac4127eef6e6ffdf02dc45" },
                { v: "12.0.3", id: "fd9dcab4f9a4dbfe401a706889149747" }
            ];
            versions.forEach(app => {
                document.write(`
                    <div class="glass-card p-5 rounded-[2.5rem] flex items-center group transition-all duration-500 hover:bg-white/5">
                        <div class="shimmer w-20 h-20 bg-slate-900 rounded-3xl flex-shrink-0 flex items-center justify-center p-2 shadow-2xl">
                            <img src="wolf.png.JPG" class="w-full h-full object-contain group-hover:scale-110 transition-transform">
                        </div>
                        <div class="mr-5 flex-1 text-right">
                            <h2 class="text-lg font-black italic">WOLF ${app.v}</h2>
                            <p class="text-[8px] text-gray-500 font-bold mb-3 uppercase tracking-widest italic">نسخة معتمدة</p>
                            <a href="itms-services://?action=download-manifest&url=https%3A%2F%2Fwww.pgyer.com%2Fapp%2Fplist%2F${app.id}" 
                               class="wolf-gradient block w-full text-center py-2.5 rounded-2xl text-[10px] font-black shadow-lg active:scale-95 transition-all">
                               تـثـبـيـت الآن
                            </a>
                        </div>
                    </div>
                `);
            });
        </script>
    </div>

    <footer class="mt-20 text-center pb-12">
        <p class="text-[10px] text-gray-500 font-bold uppercase tracking-[0.3em] mb-4">للدعم الفني والاستفسارات</p>
        <a href="https://wa.me/966500000000?text=أهلاً محمد، أحتاج مساعدة بخصوص متجر ولف" 
           target="_blank"
           class="inline-flex items-center gap-3 bg-[#25D366]/10 border border-[#25D366]/30 px-10 py-4 rounded-[2rem] group hover:bg-[#25D366] transition-all duration-500">
           <span class="text-sm font-black text-[#25D366] group-hover:text-white transition-colors">تواصل معي واتساب</span>
        </a>
    </footer>

</body>
</html>
